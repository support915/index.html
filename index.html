<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Dummy Corporation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">D</div>
                <span class="font-bold text-xl tracking-tight">Dummy Corp.</span>
            </div>
            <nav class="hidden md:flex space-x-8 text-sm font-medium text-slate-600">
                <a href="#" class="hover:text-blue-600 transition">ホーム</a>
                <a href="#" class="hover:text-blue-600 transition">サービス</a>
                <a href="#" class="hover:text-blue-600 transition font-bold text-blue-600 border-b-2 border-blue-600 pb-1">お問い合わせ</a>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-12 md:py-20">
        <div class="text-center mb-12">
            <h1 class="text-3xl md:text-4xl font-bold mb-4">お問い合わせ</h1>
            <p class="text-slate-500 max-w-lg mx-auto">
                サービスに関するご質問など、お気軽にお問い合わせください。
            </p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-10">
            <!-- Formspree Integration with redirect feature -->
            <form id="contactForm" action="https://formspree.io/f/support@lasinva.com" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="name" class="block text-sm font-semibold mb-2">お名前 <span class="text-red-500">*</span></label>
                        <input type="text" id="name" name="name" required placeholder="山田 太郎" 
                            class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-semibold mb-2">メールアドレス <span class="text-red-500">*</span></label>
                        <input type="email" id="email" name="_replyto" required placeholder="example@dummy.jp"
                            class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                    </div>
                </div>

                <div>
                    <label for="category" class="block text-sm font-semibold mb-2">お問い合わせ種別 <span class="text-red-500">*</span></label>
                    <select id="category" name="category" required
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white">
                        <option value="">選択してください</option>
                        <option value="service">サービスについて</option>
                        <option value="billing">お支払いについて</option>
                        <option value="support">技術サポート</option>
                        <option value="other">その他</option>
                    </select>
                </div>

                <div>
                    <label for="message" class="block text-sm font-semibold mb-2">お問い合わせ内容 <span class="text-red-500">*</span></label>
                    <textarea id="message" name="message" rows="5" required placeholder="こちらにご記入ください"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"></textarea>
                </div>

                <div class="flex items-start space-x-3">
                    <input type="checkbox" id="privacy" name="_optin" value="agreed" required class="mt-1 w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                    <label for="privacy" class="text-sm text-slate-600 leading-relaxed">
                        プライバシーポリシーに同意の上、送信してください。
                    </label>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="w-full md:w-auto px-8 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-all flex items-center justify-center space-x-2">
                        <span id="btnText">送信する</span>
                        <div id="btnSpinner" class="hidden spinner"></div>
                    </button>
                </div>
                <!-- Error notification area -->
                <div id="formStatus" class="mt-4 p-4 rounded-lg bg-red-50 text-red-700 text-sm font-medium hidden"></div>
            </form>

            <div id="successMessage" class="hidden fade-in text-center py-10">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold mb-4">送信が完了しました</h2>
                <p class="text-slate-500 mb-8">
                    support@lasinva.com 宛にメッセージをお送りしました。<br>
                    担当者より折り返しご連絡いたします。
                </p>
                <button onclick="window.location.reload()" class="px-6 py-3 bg-slate-800 text-white rounded-lg hover:bg-slate-900 transition">
                    ホームへ戻る
                </button>
            </div>
        </div>
    </main>

    <footer class="border-t border-slate-200 py-8 bg-white text-center text-slate-400 text-sm">
        &copy; 2024 Dummy Corporation.
    </footer>

    <script>
        const form = document.getElementById('contactForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const successMessage = document.getElementById('successMessage');
        const statusMsg = document.getElementById('formStatus');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            btnText.textContent = '送信中...';
            btnSpinner.classList.remove('hidden');
            statusMsg.classList.add('hidden');

            const formData = new FormData(form);

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                if (response.ok) {
                    form.classList.add('hidden');
                    successMessage.classList.remove('hidden');
                    window.scrollTo({ top: 100, behavior: 'smooth' });
                } else {
                    const errorData = await response.json();
                    console.error('Formspree Error:', errorData);
                    throw new Error(errorData.errors ? errorData.errors.map(e => e.message).join(', ') : '送信に失敗しました');
                }
            } catch (error) {
                console.error('Submission Error:', error);
                submitBtn.disabled = false;
                btnText.textContent = '送信する';
                btnSpinner.classList.add('hidden');
                
                statusMsg.textContent = 'エラー: ' + error.message + '。Formspreeの認証メールを確認してください。';
                statusMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
